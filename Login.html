<!DOCTYPE html>
<html>
<head>
    <title>Login Authentication System</title>
    
	<style>
	body {
    text-align: center;
}

.form-container {
    margin: 20px;
    padding: 20px;
    border: 1px solid #ccc;
    display: inline-block;
	background-color:LightGray;
	box-shadow: 1px 1px 10px 5px black;
}

button {
    margin-top: 10px;
}

#secured-page {
    display: none;
}

	</style>
</head>
<body>
    <h1>Login Authentication System</h1>
<br><br>
    <!-- Registration Form -->
    <div class="form-container" id="registration-form">
        <h2>Register</h2>
        <form id="register-form">
            <input type="text" id="register-username" placeholder="Username" required>
            <input type="password" id="register-password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <!-- Login Form -->
    <div class="form-container" id="login-form">
        <h2>Login</h2>
        <form id="login-form">
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Secured Page -->
    <div class="form-container" id="secured-page" style="display:none;">
        <h2>Secured Page</h2>
        <p>Welcome, <span id="user-welcome"></span>!</p>
        <button id="logout">Logout</button>
    </div>

    <script> 
	// Sample user data (in a real system, you'd store this on a server)
const users = [];

// Registration
document.getElementById('register-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const username = document.getElementById('register-username').value;
    const password = document.getElementById('register-password').value;
    
    // Simulated server-side check (in a real system, you'd send data to the server)
    if (username && password) {
        users.push({ username, password });
        alert('Registration successful! You can now log in.');
    } else {
        alert('Please fill in both fields.');
    }

    // Clear the registration form
    document.getElementById('register-form').reset();
});

// Login
document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    
    // Simulated server-side check (in a real system, you'd validate against stored user data on the server)
    const user = users.find(u => u.username === username && u.password === password);
    if (user) {
        // Show the secured page and hide the login/registration forms
        document.getElementById('secured-page').style.display = 'block';
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('registration-form').style.display = 'none';

        // Display a welcome message
        document.getElementById('user-welcome').textContent = username;
    } else {
        alert('Login failed. Please check your username and password.');
    }

    // Clear the login form
    document.getElementById('login-form').reset();
});

// Logout
document.getElementById('logout').addEventListener('click', function () {
    // Hide the secured page and show the login/registration forms
    document.getElementById('secured-page').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('registration-form').style.display = 'block';
    
    // Clear the login form
    document.getElementById('login-form').reset();
});

	</script>
</body>
</html>
